name: Next.js CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_NAME: godashop_nextjs
      NEXT_PUBLIC_API_URL: http://localhost:3091
      NEXT_PUBLIC_GOOGLE_RECAPTCH_SITE_KEY: test-key
      NEXT_PUBLIC_NODE_API_URL: http://localhost:3091
      NEXT_PUBLIC_NEST_API_URL: http://localhost:3000
      NEXT_PUBLIC_VNPAY_URL: http://localhost:3000
      NEXT_NODE_PUBLIC_IMAGE_BASE_URL: http://localhost:3091/images
      NEXT_PUBLIC_CHAT_API_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
